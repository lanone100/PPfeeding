<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP 押出機下料計算器</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0e0f11;
            --panel: #16181d;
            --border: #2a2d35;
            --accent: #f0a500;
            --accent2: #e05c2a;
            --text: #d4d6db;
            --muted: #5a5e6b;
            --red: #e05c2a;
            --green: #3ec98a;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 60px;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 32px;
            position: relative;
        }
        .header-tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 0.05em;
            line-height: 1;
            color: #fff;
        }
        .header h1 span { color: var(--accent); }
        .header-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 6px;
            letter-spacing: 0.05em;
        }
        .header-line {
            position: absolute;
            right: 0;
            top: 0;
            width: 80px;
            height: 80px;
            border-top: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
            opacity: 0.4;
        }

        /* Panel */
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }
        .panel-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: var(--accent);
            line-height: 1;
            min-width: 24px;
        }
        .panel-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
        }
        .panel-body { padding: 20px; }

        /* Input row */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .input-row:last-child { margin-bottom: 0; }
        .input-group { position: relative; }
        .input-group label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: #fff;
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            padding: 10px 38px 10px 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }
        .input-wrap input::-webkit-outer-spin-button,
        .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .input-wrap input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(240,165,0,0.15);
        }
        .input-unit {
            position: absolute;
            right: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            pointer-events: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
            border-style: dashed;
            border-color: var(--border);
            background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 4px, transparent 4px, transparent 8px);
        }

        /* Mode toggle */
        .mode-tabs {
            display: flex;
            gap: 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .mode-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: var(--muted);
            cursor: pointer;
            border: none;
            background: transparent;
            transition: all 0.2s;
        }
        .mode-tab.active {
            background: var(--accent);
            color: #000;
            font-weight: 500;
        }

        /* PP ratio bar */
        .ratio-bar-wrap {
            margin: 16px 0 8px;
        }
        .ratio-bar-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .ratio-bar {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            display: flex;
            overflow: hidden;
            gap: 1px;
        }
        .bar-pp { background: #4a9eff; transition: flex 0.3s; }
        .bar-mb { background: var(--accent); transition: flex 0.3s; }
        .bar-add { background: var(--green); transition: flex 0.3s; }
        .ratio-legend {
            display: flex;
            gap: 14px;
            margin-top: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
        }
        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* Results */
        .result-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .result-row {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .result-row:last-child { border-bottom: none; }
        .result-row:hover { background: rgba(255,255,255,0.02); }
        .result-row.total {
            background: rgba(240,165,0,0.07);
            border-top: 1px solid rgba(240,165,0,0.2);
        }
        .result-label {
            flex: 1;
        }
        .result-name {
            font-size: 0.78rem;
            color: #fff;
            font-weight: 700;
        }
        .result-pct {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 2px;
        }
        .result-val {
            text-align: right;
        }
        .result-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            line-height: 1;
            color: #fff;
        }
        .result-num.accent { color: var(--accent); }
        .result-unit {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 2px;
        }
        .result-color-bar {
            width: 3px;
            height: 36px;
            border-radius: 2px;
            margin-right: 14px;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 28px;
            letter-spacing: 0.1em;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .panel, .result-panel { animation: fadeIn 0.4s ease both; }
        .panel:nth-child(2) { animation-delay: 0.05s; }
        .panel:nth-child(3) { animation-delay: 0.1s; }
        .result-panel { animation-delay: 0.15s; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-line"></div>
        <div class="header-tag">Polypropylene Extrusion</div>
        <h1>下料<span>計算</span></h1>
        <div class="header-sub">DOSING CALCULATOR · v2.0</div>
    </div>

    <!-- Panel 1: Formula -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-num">01</span>
            <span class="panel-title">配方比例設定</span>
        </div>
        <div class="panel-body">
            <div class="input-row">
                <div class="input-group">
                    <label>色母 Color MB</label>
                    <div class="input-wrap">
                        <input type="number" id="mb_ratio" value="2.0" step="0.1" min="0" max="100" oninput="calculate()">
                        <span class="input-unit">%</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>添加劑 Additive</label>
                    <div class="input-wrap">
                        <input type="number" id="add_ratio" value="0.0" step="0.1" min="0" max="100" oninput="calculate()">
                        <span class="input-unit">%</span>
                    </div>
                </div>
            </div>

            <div class="ratio-bar-wrap">
                <div class="ratio-bar-label">配方比例分佈</div>
                <div class="ratio-bar">
                    <div class="bar-pp" id="bar_pp"></div>
                    <div class="bar-mb" id="bar_mb"></div>
                    <div class="bar-add" id="bar_add"></div>
                </div>
                <div class="ratio-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#4a9eff"></div><span id="leg_pp">PP 98.0%</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div><span id="leg_mb">MB 2.0%</span></div>
                    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span id="leg_add">ADD 0.0%</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Panel 2: Input mode -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-num">02</span>
            <span class="panel-title">下料計算 (二選一)</span>
        </div>
        <div class="panel-body">
            <div class="mode-tabs">
                <button class="mode-tab active" id="tab_total" onclick="switchMode('total')">模式 A · 總產量</button>
                <button class="mode-tab" id="tab_main" onclick="switchMode('main')">模式 B · 主料重量</button>
            </div>

            <div id="input_total">
                <div class="input-group">
                    <label>預計總產量 Total Output</label>
                    <div class="input-wrap">
                        <input type="number" id="total_weight" placeholder="例如 500" oninput="calculate('total')">
                        <span class="input-unit">kg</span>
                    </div>
                </div>
            </div>

            <div id="input_main" style="display:none">
                <div class="input-group">
                    <label>固定主料重量 PP Base Weight</label>
                    <div class="input-wrap">
                        <input type="number" id="main_weight" placeholder="例如 25 (一袋)" oninput="calculate('main')">
                        <span class="input-unit">kg</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Results -->
    <div class="result-panel">
        <div class="panel-header" style="background:rgba(240,165,0,0.05); border-color: rgba(240,165,0,0.2);">
            <span class="panel-num">↓</span>
            <span class="panel-title">配料清單 Bill of Materials</span>
        </div>
        <div id="result_rows">
            <div class="result-row">
                <div class="result-color-bar" style="background:#4a9eff"></div>
                <div class="result-label">
                    <div class="result-name">PP 主料</div>
                    <div class="result-pct" id="pp_pct">98.0 %</div>
                </div>
                <div class="result-val">
                    <div class="result-num" id="pp_val">—</div>
                    <div class="result-unit" id="pp_unit">kg</div>
                </div>
            </div>
            <div class="result-row">
                <div class="result-color-bar" style="background:var(--accent)"></div>
                <div class="result-label">
                    <div class="result-name">色母 Color MB</div>
                    <div class="result-pct" id="mb_pct">2.0 %</div>
                </div>
                <div class="result-val">
                    <div class="result-num" id="mb_val">—</div>
                    <div class="result-unit" id="mb_unit">kg</div>
                </div>
            </div>
            <div class="result-row">
                <div class="result-color-bar" style="background:var(--green)"></div>
                <div class="result-label">
                    <div class="result-name">添加劑 Additive</div>
                    <div class="result-pct" id="add_pct">0.0 %</div>
                </div>
                <div class="result-val">
                    <div class="result-num" id="add_val">—</div>
                    <div class="result-unit" id="add_unit">kg</div>
                </div>
            </div>
            <div class="result-row total">
                <div class="result-color-bar" style="background:var(--accent)"></div>
                <div class="result-label">
                    <div class="result-name" style="color:var(--accent)">總重 Total</div>
                    <div class="result-pct">100.0 %</div>
                </div>
                <div class="result-val">
                    <div class="result-num accent" id="total_val">—</div>
                    <div class="result-unit">kg</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">PP EXTRUSION DOSING CALCULATOR · INDUSTRIAL TOOL</div>
</div>

<script>
let activeMode = 'total';

function switchMode(mode) {
    activeMode = mode;
    document.getElementById('input_total').style.display = mode === 'total' ? 'block' : 'none';
    document.getElementById('input_main').style.display = mode === 'main' ? 'block' : 'none';
    document.getElementById('tab_total').classList.toggle('active', mode === 'total');
    document.getElementById('tab_main').classList.toggle('active', mode === 'main');
    calculate(mode);
}

function formatWeight(w) {
    if (isNaN(w) || w === 0) return { val: '—', unit: 'kg' };
    if (w < 1) return { val: (w * 1000).toFixed(0), unit: 'g' };
    return { val: w.toFixed(2), unit: 'kg' };
}

function calculate(mode) {
    if (mode) activeMode = mode;

    const mb_p = parseFloat(document.getElementById('mb_ratio').value) || 0;
    const add_p = parseFloat(document.getElementById('add_ratio').value) || 0;
    const main_p = Math.max(0, 100 - mb_p - add_p);

    // Update ratio bar
    document.getElementById('bar_pp').style.flex = main_p;
    document.getElementById('bar_mb').style.flex = mb_p;
    document.getElementById('bar_add').style.flex = add_p;
    document.getElementById('leg_pp').textContent = `PP ${main_p.toFixed(1)}%`;
    document.getElementById('leg_mb').textContent = `MB ${mb_p.toFixed(1)}%`;
    document.getElementById('leg_add').textContent = `ADD ${add_p.toFixed(1)}%`;

    let totalW = 0, mainW = 0, mbW = 0, addW = 0;

    if (activeMode === 'main') {
        mainW = parseFloat(document.getElementById('main_weight').value) || 0;
        totalW = main_p > 0 ? mainW / (main_p / 100) : 0;
        const el = document.getElementById('total_weight');
        if (el) el.value = totalW > 0 ? totalW.toFixed(2) : '';
    } else {
        totalW = parseFloat(document.getElementById('total_weight').value) || 0;
        mainW = totalW * (main_p / 100);
        const el = document.getElementById('main_weight');
        if (el) el.value = mainW > 0 ? mainW.toFixed(2) : '';
    }

    mbW = totalW * (mb_p / 100);
    addW = totalW * (add_p / 100);

    const pp = formatWeight(mainW);
    const mb = formatWeight(mbW);
    const add = formatWeight(addW);
    const tot = formatWeight(totalW);

    document.getElementById('pp_pct').textContent = `${main_p.toFixed(1)} %`;
    document.getElementById('mb_pct').textContent = `${mb_p.toFixed(1)} %`;
    document.getElementById('add_pct').textContent = `${add_p.toFixed(1)} %`;

    document.getElementById('pp_val').textContent = pp.val;
    document.getElementById('pp_unit').textContent = pp.unit;
    document.getElementById('mb_val').textContent = mb.val;
    document.getElementById('mb_unit').textContent = mb.unit;
    document.getElementById('add_val').textContent = add.val;
    document.getElementById('add_unit').textContent = add.unit;
    document.getElementById('total_val').textContent = tot.val;
}

// Init
calculate('total');
</script>
</body>
</html>
